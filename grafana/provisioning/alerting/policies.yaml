apiVersion: 1

# Route every firing alert to the Discord contact point.
policies:
  - orgId: 1
    receiver: discord
    group_by:
      - grafana_folder
      - alertname
    group_wait: 30s        # wait before sending the first notification for a new group
    group_interval: 5m     # wait before sending an updated notification for the group
    repeat_interval: 1h    # re-send a still-firing alert at most once per hour
