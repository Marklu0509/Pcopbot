services:
  bot:
    build: .
    container_name: pcopbot-bot
    command: python -m bot.main
    env_file: .env
    volumes:
      - db-data:/app/data
    expose:
      - "8000"        # Prometheus metrics endpoint (internal only)
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: pcopbot-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    expose:
      - "9090"        # Internal only — accessed via Grafana
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: pcopbot-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-changeme}
      - GF_SERVER_HTTP_ADDR=0.0.0.0
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana-data:/var/lib/grafana
    expose:
      - "3000"        # Internal only — proxied via Nginx at /grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  dashboard:
    build: .
    container_name: pcopbot-dashboard
    command: >
      streamlit run dashboard/app.py
      --server.port=8501
      --server.address=0.0.0.0
      --server.headless=true
      --server.enableCORS=false
      --server.enableXsrfProtection=true
      --server.enableWebsocketCompression=false
    env_file:
      - .env.dashboard
    volumes:
      - db-data:/app/data
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: pcopbot-nginx
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/templates/ssl.conf:ro
      - ./nginx/http-only.conf:/etc/nginx/templates/http-only.conf:ro
      - ./nginx/entrypoint.sh:/entrypoint.sh:ro
      - letsencrypt:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    depends_on:
      - dashboard
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    container_name: pcopbot-certbot
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: /bin/true
    # Run manually: docker compose run --rm certbot certonly ...

volumes:
  db-data:
  letsencrypt:
  certbot-www:
  prometheus-data:
  grafana-data:
